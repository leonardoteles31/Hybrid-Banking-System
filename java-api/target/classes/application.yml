server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:bankdb
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2

app:
  integration:
    inbound-path: ../integration/inbound
    outbound-path: ../integration/outbound